<style>
/* ===== 全局基础 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a0f00;
  color: #c9a84c;
  font-family: "Noto Serif SC", "Source Han Serif SC", serif, "宋体";
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
}

/* ===== 开始画面 ===== */
#start-screen {
  position: fixed;
  inset: 0;
  background: #1a0f00;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.8s;
}
#start-screen.fade-out { opacity: 0; pointer-events: none; }

.start-title {
  font-size: 3rem;
  color: #e8c96a;
  letter-spacing: 0.3em;
  text-shadow: 0 0 20px #ff6600aa;
  margin-bottom: 0.5rem;
}
.start-subtitle {
  font-size: 1rem;
  color: #8a7040;
  letter-spacing: 0.2em;
  margin-bottom: 2rem;
}
.start-desc {
  max-width: 320px;
  text-align: center;
  font-size: 0.85rem;
  color: #a08040;
  line-height: 1.9;
  margin-bottom: 2.5rem;
}
#btn-start {
  background: transparent;
  border: 1px solid #c9a84c;
  color: #c9a84c;
  padding: 0.7rem 2.5rem;
  font-size: 1rem;
  font-family: inherit;
  letter-spacing: 0.2em;
  cursor: pointer;
  transition: all 0.3s;
}
#btn-start:hover {
  background: #c9a84c22;
  box-shadow: 0 0 12px #c9a84c55;
}

/* ===== 主游戏界面 ===== */
#game-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 420px;
  height: 100vh;
  padding: 12px 16px;
}
#game-screen.active { display: flex; }

/* ===== 属性仪表盘 ===== */
#stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  width: 100%;
  margin-bottom: 10px;
}
.stat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.stat-icon { font-size: 1.1rem; }
.stat-track {
  width: 100%;
  height: 6px;
  background: #3a2510;
  border-radius: 3px;
  overflow: visible;
  position: relative;
}
.stat-fill {
  height: 100%;
  border-radius: 3px;
  background: #c9a84c;
  transition: width 0.25s ease, background 0.25s;
  width: 50%;
}
.stat-fill.danger-low  { background: #cc3311; }
.stat-fill.danger-high { background: #ff8800; }

.stat-preview {
  font-size: 0.6rem;
  height: 14px;
  line-height: 14px;
  font-weight: bold;
}
.stat-preview.up   { color: #66dd66; }
.stat-preview.down { color: #dd4444; }

/* ===== 角色名 ===== */
/* 角色名：改为卡片内部底部 */
#bearer-name {
  font-size: 0.8rem;
  color: #8a7040;
  letter-spacing: 0.15em;
  text-align: center;
  margin-top: auto;   /* 推到卡片底部 */
  padding-top: 10px;
  min-height: 1.2em;
  width: 100%;
  border-top: 1px solid #3a2510;
}

/* ===== 卡片区域 ===== */
#card-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  position: relative;
  overflow: hidden;
}

#card {
  width: 260px;
  min-height: 340px;
  background: linear-gradient(160deg, #2a1a08 0%, #1e1206 100%);
  border: 1px solid #5a4020;
  border-radius: 12px;
  padding: 24px 20px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: grab;
  position: relative;
  box-shadow: 0 8px 32px #00000088;
  transition: box-shadow 0.2s;
  touch-action: none;
  overflow: hidden;   /* 遮住 fondyesno 面板的初始溢出位置 */
}
#card:active { cursor: grabbing; }
#card.end-card {
  border-color: #661111;
  background: linear-gradient(160deg, #2a0808 0%, #1a0404 100%);
}
#card.final-card {
  border-color: #c9a84c;
  background: linear-gradient(160deg, #1a1000 0%, #0a0800 100%);
  box-shadow: 0 0 40px #c9a84c44;
}

.card-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  line-height: 1;
}
.card-question {
  font-size: 0.88rem;
  line-height: 1.8;
  text-align: center;
  color: #c9a84c;
  flex: 1;
}
.card-answer {
  font-size: 0.78rem;
  color: #8a7040;
  text-align: center;
  margin-top: 12px;
  min-height: 2.4em;
  line-height: 1.6;
  font-style: italic;
  transition: opacity 0.2s;
}
.card-ornament {
  width: 40px;
  height: 1px;
  background: #5a4020;
  margin: 12px auto;
}

/* ===== fondyesno 决策面板（仿原版，卡片顶部向下滑入）===== */
#fond-yesno {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  border-bottom: 1px solid #3a2510;
  border-radius: 12px 12px 0 0;
  background: linear-gradient(to bottom, #1a0f00ee, transparent);
  /* 初始藏在卡片顶部上方（overflow:hidden 裁掉） */
  transform: translateY(-100%);
  pointer-events: none;
}
#fond-yesno.transitioning {
  transition: transform 0.22s ease-out;
}

.fond-option {
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  opacity: 0;
}
#fond-no  { color: #dd4444; }   /* 红色：拒绝，左侧，右滑(dx>0)高亮 */
#fond-yes { color: #66cc66; }   /* 绿色：接受，右侧，左滑(dx<0)高亮 */

/* ===== 底部状态栏 ===== */
#status-bar {
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 16px;
  padding: 10px 0 4px;
  font-size: 0.72rem;
  color: #5a4020;
  letter-spacing: 0.12em;
  border-top: 1px solid #2a1a08;
  margin-top: 8px;
}

/* ===== 传承动画画面 ===== */
#transmission-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: #1a0f00;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
#transmission-screen.active { display: flex; }

.transmission-fire {
  font-size: 4rem;
  animation: flicker 0.3s infinite alternate;
}
@keyframes flicker {
  from { opacity: 1; text-shadow: 0 0 20px #ff4400; }
  to   { opacity: 0.4; text-shadow: 0 0 5px #ff4400; }
}
.transmission-text {
  margin-top: 1.5rem;
  font-size: 0.9rem;
  color: #8a7040;
  letter-spacing: 0.2em;
}

/* ===== 真结局画面 ===== */
#ending-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: #050300;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
#ending-screen.active { display: flex; }
.ending-fire {
  font-size: 5rem;
  animation: ascend 3s infinite alternate;
}
@keyframes ascend {
  from { transform: translateY(0); opacity: 0.7; }
  to   { transform: translateY(-10px); opacity: 1; }
}
.ending-title {
  font-size: 1.5rem;
  color: #e8c96a;
  letter-spacing: 0.3em;
  margin: 1.5rem 0 1rem;
}
.ending-text {
  max-width: 300px;
  text-align: center;
  font-size: 0.85rem;
  color: #8a7040;
  line-height: 2;
}
</style>

// ============================================================
//  GAME STATE
// ============================================================
const state = {
  stats: { bond: 50, dye: 50, burn: 50, karma: 50 },
  customs: {},
  turns: 0,
  dynastyCount: 1,
  nextCard: '',
  lastBearer: '',
  isOver: false,
  cards: []   // runtime copy with nextturn tracking
};

// ============================================================
//  CONDITION PARSER
// ============================================================
function testCond(condStr) {
  if (!condStr || condStr.trim() === '') return true;
  // OR 分割
  const orParts = condStr.split(/\s+or\s+/i);
  return orParts.some(orPart => {
    // AND 分割
    const andParts = orPart.split(/\s+and\s+/i);
    return andParts.every(part => testSingle(part.trim()));
  });
}

function testSingle(expr) {
  // !flag
  if (expr.startsWith('!')) {
    const key = expr.slice(1);
    return (state.customs[key] || 0) <= 0;
  }
  // varName>N
  const gtM = expr.match(/^(\w+)>(\d+)$/);
  if (gtM) return getVal(gtM[1]) > parseFloat(gtM[2]);
  // varName<N
  const ltM = expr.match(/^(\w+)<(\d+)$/);
  if (ltM) return getVal(ltM[1]) < parseFloat(ltM[2]);
  // varName=N
  const eqM = expr.match(/^(\w+)=(\d+)$/);
  if (eqM) return getVal(eqM[1]) === parseFloat(eqM[2]);
  // 纯 flag（自定义变量 > 0）
  if (/^\w+$/.test(expr)) {
    if (['bond','dye','burn','karma'].includes(expr)) return getVal(expr) > 0;
    return (state.customs[expr] || 0) > 0;
  }
  return true;
}

function getVal(key) {
  if (key in state.stats) return state.stats[key];
  return state.customs[key] || 0;
}

// ============================================================
//  CARD SELECTION
// ============================================================
function selectCard() {
  const deck = state.cards;

  // chain 精确跳转
  if (state.nextCard) {
    const target = deck.find(c => c.name === state.nextCard);
    state.nextCard = '';
    if (target && testCond(target.conditions)) return target;
  }

  // 过滤候选卡
  const candidates = deck.filter(c => {
    if (c._locked) return false;
    if (c.weight === 0) return false;
    if (c.bearer === state.lastBearer && c.bearer !== 'anyone' && c.bearer !== 'end') return false;
    if ((c._nextturn || 0) > state.turns) return false;
    if (!testCond(c.conditions)) return false;
    return true;
  });

  if (candidates.length === 0) return deck[0];

  // weight=-1 强制
  const forced = candidates.find(c => c.weight === -1);
  if (forced) return forced;

  // 加权随机
  const total = candidates.reduce((s, c) => s + c.weight, 0);
  let r = Math.random() * total;
  for (const c of candidates) {
    r -= c.weight;
    if (r <= 0) return c;
  }
  return candidates[candidates.length - 1];
}

// ============================================================
//  APPLY OUTCOME
// ============================================================
function applyOutcome(outcome) {
  // 属性变化
  ['bond','dye','burn','karma'].forEach(k => {
    if (outcome[k] !== undefined && outcome[k] !== 0) {
      state.stats[k] = Math.max(0, Math.min(100, state.stats[k] + outcome[k]));
    }
  });
  // chain 跳转
  if (outcome.chain) state.nextCard = outcome.chain;
  // custom 变量
  if (outcome.custom) {
    Object.assign(state.customs, outcome.custom);
  }
}

// ============================================================
//  BOUNDARY CHECK → 设置 EndCard
// ============================================================
const END_CARD_MAP = {
  bond:  { low: 'end_bond_low',  high: 'end_bond_high'  },
  dye:   { low: 'end_dye_low',   high: 'end_dye_high'   },
  burn:  { low: 'end_burn_low',  high: 'end_burn_high'  },
  karma: { low: 'end_karma_low', high: 'end_karma_high' }
};

function checkBoundaries() {
  for (const [k, v] of Object.entries(state.stats)) {
    if (v <= 0) { state.nextCard = END_CARD_MAP[k].low;  return; }
    if (v >= 100){ state.nextCard = END_CARD_MAP[k].high; return; }
  }
}

// ============================================================
//  LOCKTURN 处理
// ============================================================
function handleLockturn(card) {
  if (card.lockturn === -1) {
    // del：永久移除
    state.cards = state.cards.filter(c => c !== card);
  } else if (card.lockturn > 0) {
    card._nextturn = state.turns + card.lockturn;
  }
}

// ============================================================
//  TRANSMISSION（传承）
// ============================================================
function doTransmission() {
  state.stats = { bond: 50, dye: 50, burn: 50, karma: 50 };
  state.customs = {};
  state.turns = 0;
  state.nextCard = '';
  state.lastBearer = '';
  state.dynastyCount++;
  // 重新加载全部卡牌（恢复 del 卡，重置冷却）
  state.cards = CARDS.map(c => Object.assign({}, c, { _nextturn: 0, _locked: false }));
}

// ============================================================
//  RENDER
// ============================================================
const STAT_KEYS = ['bond', 'dye', 'burn', 'karma'];

function renderStats() {
  STAT_KEYS.forEach(k => {
    const fill = document.getElementById('fill-' + k);
    const v = state.stats[k];
    fill.style.width = v + '%';
    fill.classList.remove('danger-low', 'danger-high');
    if (v <= 20) fill.classList.add('danger-low');
    else if (v >= 80) fill.classList.add('danger-high');
  });
}

function showPreview(outcomes) {
  STAT_KEYS.forEach(k => {
    const el = document.getElementById('prev-' + k);
    const val = outcomes ? (outcomes[k] || 0) : 0;
    if (val > 0)  { el.textContent = '▲ +' + val; el.className = 'stat-preview up'; }
    else if (val < 0) { el.textContent = '▼ ' + val; el.className = 'stat-preview down'; }
    else { el.textContent = ''; el.className = 'stat-preview'; }
  });
}

function renderCard(card) {
  const cardEl = document.getElementById('card');
  cardEl.className = card.isEnd ? 'end-card' : card.isFinal ? 'final-card' : '';

  const bearerName = document.getElementById('bearer-name');
  bearerName.textContent = (card.bearer !== 'end' && card.bearer !== 'anyone') ? card.bearer : '';

  document.getElementById('card-icon').textContent = card.icon || '🔥';
  document.getElementById('card-question').textContent = card.question;
  document.getElementById('card-answer').textContent = '';

  // fondyesno文字：左=fond-no(拒绝/红)，右=fond-yes(接受/绿)
  document.getElementById('fond-yes').textContent = card.override_yes || '接受';
  document.getElementById('fond-no').textContent  = card.override_no  || '拒绝';
  const fond = document.getElementById('fond-yesno');
  fond.classList.remove('transitioning');
  fond.style.transform = 'translateY(-100%)';
  document.getElementById('fond-no').style.opacity  = '0';
  document.getElementById('fond-yes').style.opacity = '0';
}

function renderStatus() {
  const ordinals = ['','一','二','三','四','五','六','七','八','九','十',
    '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十'];
  const d = state.dynastyCount;
  const label = (d <= 20) ? '第' + ordinals[d] + '世凤凰火' : '第' + d + '世凤凰火';
  document.getElementById('dynasty-label').textContent = label;
  document.getElementById('turn-label').textContent = '第 ' + (state.turns + 1) + ' 回';
}

// ============================================================
//  CURRENT CARD HOLDER
// ============================================================
let currentCard = null;

function nextTurn(outcome, isEndConfirm) {
  if (outcome) {
    applyOutcome(outcome);
    renderStats();
  }
  if (!isEndConfirm) checkBoundaries();

  if (currentCard) {
    handleLockturn(currentCard);
    if (currentCard.bearer !== 'end' && currentCard.bearer !== 'anyone') {
      state.lastBearer = currentCard.bearer;
    }
    state.turns++;
  }

  renderStatus();
  currentCard = selectCard();

  if (!currentCard) { currentCard = state.cards[0]; }

  // 真结局
  if (currentCard && currentCard.isFinal) {
    animateCardIn(currentCard);
    setTimeout(() => showFinalEnding(), 2000);
    return;
  }

  animateCardIn(currentCard);
}

// ============================================================
//  CARD ANIMATION
// ============================================================
function animateCardIn(card) {
  const cardEl = document.getElementById('card');
  cardEl.style.transition = 'none';
  cardEl.style.transform = 'translateX(0) translateY(80px) rotate(0deg)';
  cardEl.style.opacity = '0';
  renderCard(card);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      cardEl.style.transition = 'transform 0.28s ease-out, opacity 0.28s ease-out';
      cardEl.style.transform = 'translateX(0) translateY(0) rotate(0deg)';
      cardEl.style.opacity = '1';
      // 新卡进入完成后解锁输入
      setTimeout(() => { drag.locked = false; }, 300);
    });
  });
}

function animateCardOut(direction, callback) {
  const cardEl = document.getElementById('card');
  // 先停留 900ms 让玩家阅读答案文字，然后再飞出
  setTimeout(() => {
    const tx = direction * 600;
    const rot = direction * 25;
    cardEl.style.transition = 'transform 0.3s ease-in, opacity 0.3s ease-in';
    cardEl.style.transform = `translateX(${tx}px) rotate(${rot}deg)`;
    cardEl.style.opacity = '0';
    setTimeout(callback, 320);
  }, 900);
}

// ============================================================
//  SWIPE / DRAG INTERACTION
// ============================================================
let drag = {
  active: false,
  startX: 0,
  currentX: 0,
  previewing: false,
  locked: false   // 决策后锁定，防止动画期间重复触发
};

const PREVIEW_THRESH = 80;
const DECIDE_THRESH  = 100;

function onDragStart(x) {
  if (drag.locked) return;   // 动画期间禁止新操作
  drag.active = true;
  drag.startX = x;
  drag.currentX = x;
  drag.previewing = false;
  const cardEl = document.getElementById('card');
  cardEl.style.transition = 'none';
}

function onDragMove(x) {
  if (!drag.active) return;
  drag.currentX = x;
  const dx = x - drag.startX;
  const rot = dx * 0.08;
  const cardEl = document.getElementById('card');
  cardEl.style.transform = `translateX(${dx}px) translateY(0) rotate(${rot}deg)`;

  // ── fondyesno 面板控制（仿原版 fondyesno 逻辑）──
  const fond    = document.getElementById('fond-yesno');
  const fondNo  = document.getElementById('fond-no');
  const fondYes = document.getElementById('fond-yes');

  // 面板展开量：|dx| 超过 20px 开始滑入，超过 PREVIEW_THRESH 完全展开
  const absDx = Math.abs(dx);
  const slideRatio = Math.min(1, Math.max(0, (absDx - 20) / (PREVIEW_THRESH - 20)));
  // translateY 从 -100%（完全隐藏在顶部上方）到 0%（完全展开，覆盖卡片顶部）
  fond.classList.remove('transitioning');
  fond.style.transform = `translateY(${-(1 - slideRatio) * 100}%)`;

  if (absDx > 20) {
    if (dx < 0) {
      // 向左滑 → 右侧 fond-yes(绿/接受) 高亮
      fondYes.style.opacity = String(slideRatio);
      fondNo.style.opacity  = String(slideRatio * 0.25);
      if (absDx > PREVIEW_THRESH && currentCard) showPreview(currentCard.yes);
      else showPreview(null);
    } else {
      // 向右滑 → 左侧 fond-no(红/拒绝) 高亮
      fondNo.style.opacity  = String(slideRatio);
      fondYes.style.opacity = String(slideRatio * 0.25);
      if (absDx > PREVIEW_THRESH && currentCard) showPreview(currentCard.no);
      else showPreview(null);
    }
  } else {
    fondNo.style.opacity  = '0';
    fondYes.style.opacity = '0';
    showPreview(null);
  }
}

function onDragEnd() {
  if (!drag.active) return;
  drag.active = false;
  const dx = drag.currentX - drag.startX;
  const cardEl = document.getElementById('card');

  if (Math.abs(dx) > DECIDE_THRESH) {
    const dir = dx > 0 ? 1 : -1;
    // 左滑(dir=-1) = 接受YES，右滑(dir=1) = 拒绝NO
    const outcome    = dir === -1 ? currentCard.yes : currentCard.no;
    const answerText = dir === -1 ? currentCard.answer_yes : currentCard.answer_no;

    // 展示结果文字，锁定输入，收起 fondyesno 面板（回到顶部）
    document.getElementById('card-answer').textContent = answerText;
    const fond = document.getElementById('fond-yesno');
    fond.classList.add('transitioning');
    fond.style.transform = 'translateY(-100%)';
    document.getElementById('fond-no').style.opacity  = '0';
    document.getElementById('fond-yes').style.opacity = '0';
    showPreview(null);
    drag.locked = true;

    const isEndCard = currentCard.isEnd;
    const isFinalCard = currentCard.isFinal;

    animateCardOut(dir, () => {
      if (isFinalCard) { showFinalEnding(); return; }
      if (isEndCard) {
        showTransmission(outcome);
      } else {
        nextTurn(outcome, false);
      }
    });
  } else {
    // 弹回：卡片和面板都平滑归位（面板回到顶部上方）
    const fond = document.getElementById('fond-yesno');
    fond.classList.add('transitioning');
    fond.style.transform = 'translateY(-100%)';
    document.getElementById('fond-no').style.opacity  = '0';
    document.getElementById('fond-yes').style.opacity = '0';

    cardEl.style.transition = 'transform 0.25s ease-out, opacity 0.25s ease-out';
    cardEl.style.transform = 'translateX(0) translateY(0) rotate(0deg)';
    cardEl.style.opacity = '1';
    showPreview(null);
  }
}

// 鼠标事件
const cardEl = document.getElementById('card');
cardEl.addEventListener('mousedown', e => { e.preventDefault(); onDragStart(e.clientX); });
document.addEventListener('mousemove', e => { if (drag.active) onDragMove(e.clientX); });
document.addEventListener('mouseup', () => onDragEnd());

// 触屏事件
cardEl.addEventListener('touchstart', e => {
  e.preventDefault();
  onDragStart(e.touches[0].clientX);
}, { passive: false });
cardEl.addEventListener('touchmove', e => {
  e.preventDefault();
  onDragMove(e.touches[0].clientX);
}, { passive: false });
cardEl.addEventListener('touchend', () => onDragEnd());

// ============================================================
//  TRANSMISSION ANIMATION
// ============================================================
function showTransmission(outcome) {
  const screen = document.getElementById('transmission-screen');
  const fireEl = document.getElementById('trans-fire');
  const textEl = document.getElementById('trans-text');

  // 熄灭阶段
  fireEl.textContent = '🔥';
  textEl.textContent = '火种熄灭……';
  screen.classList.add('active');

  setTimeout(() => {
    fireEl.textContent = '✨';
    textEl.textContent = '火种传承……';
  }, 800);

  setTimeout(() => {
    fireEl.textContent = '🔥';
    textEl.textContent = '第 ' + (state.dynastyCount + 1) + ' 世凤凰火，降临！';
  }, 1400);

  setTimeout(() => {
    screen.classList.remove('active');
    doTransmission();
    renderStats();
    renderStatus();
    nextTurn(null, true);
  }, 2200);
}

// ============================================================
//  FINAL ENDING
// ============================================================
function showFinalEnding() {
  document.getElementById('ending-screen').classList.add('active');
  state.isOver = true;
}

// ============================================================
//  START GAME
// ============================================================
document.getElementById('btn-start').addEventListener('click', () => {
  const startScreen = document.getElementById('start-screen');
  startScreen.classList.add('fade-out');
  setTimeout(() => {
    startScreen.style.display = 'none';
    document.getElementById('game-screen').classList.add('active');
    // 初始化
    state.cards = CARDS.map(c => Object.assign({}, c, { _nextturn: 0, _locked: false }));
    renderStats();
    renderStatus();
    nextTurn(null, true);
  }, 800);
});
</script>
